# CI workflow — build check on PRs and main pushes.
# Deployment is handled by Vercel (auto-deploys on push to main).
#
name: CI

on:
  push:
    branches: ['main']

  pull_request:
    branches: ['main']

  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Verify lock file is in sync
        run: |
          npm install --package-lock-only
          git diff --exit-code package-lock.json || \
            (echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' and commit the lock file." && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx next build
