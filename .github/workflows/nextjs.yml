# CI workflow — build check on PRs and main pushes.
# Deployment is handled by Vercel (auto-deploys on push to main).
#
name: CI

on:
  push:
    branches: ['main']

  pull_request:
    branches: ['main']

  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Sync lock file
        run: npm install --package-lock-only

      - name: Auto-fix lock file (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet package-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: auto-sync package-lock.json"
            git push
          fi

      - name: Verify lock file is in sync (PRs only)
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code package-lock.json || \
            (echo "::error::package-lock.json is out of sync. Run 'npm install' and commit the lock file." && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npx next build
